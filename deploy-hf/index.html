<head>

<title>Aiko — Vivian</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet"/>
<script src="./live2d/live2dcubismcore.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --acc:#d4956a;--acc-soft:#d4956a33;--acc-glow:#d4956a66;
  --bg:#0e0d0c;--bg-base:#0c0b0a;--bg-sidebar:#141210;--bg-input:#1a1815;
  --t1:#ede8df;--t2:#a89880;--t3:#6b5e50;--t4:#4a423a;
  --b1:rgba(255,220,170,0.06);--b2:rgba(255,220,170,0.12);--b3:rgba(255,220,170,0.2);
  --success:#22c55e;--danger:#ef4444;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'DM Sans',system-ui,sans-serif}

/* ── Layout ── */
#root{display:flex;flex-direction:column;width:100vw;height:100vh;overflow:hidden}

/* ── Titlebar ───────────────────────────────────────────── */
#titlebar{
  height:48px;min-height:48px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--b1);user-select:none;flex-shrink:0;
}
#titlebar-left{display:flex;align-items:center;gap:4px;padding-left:12px}
.title-btn{width:38px;height:48px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all 100ms}
.title-btn:hover{background:rgba(255,255,255,0.06);color:var(--t1)}
#titlebar-center{flex:1;display:flex;align-items:center;justify-content:center;gap:10px}
#titlebar-center span{font-size:11px;font-weight:500;color:rgba(255,255,255,0.12);letter-spacing:1.5px;text-transform:uppercase}
#titlebar-right{display:flex;align-items:center}
.win-btn{width:46px;height:48px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.25);transition:all 100ms}
.win-btn:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8)}
.win-btn.close:hover{background:#c42b1c;color:#fff}

/* ── Main Body ── */
#body{flex:1;display:flex;overflow:hidden}

/* ── Sidebar ───────────────────────────────────────────── */
#sidebar{
  width:280px;min-width:280px;height:100%;z-index:10;
  background:var(--bg-sidebar);border-right:1px solid var(--b1);
  display:flex;flex-direction:column;
}
.sidebar-header{padding:16px 16px 12px;border-bottom:1px solid var(--b1)}
.brand-row{display:flex;align-items:center;justify-content:space-between}
.brand{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--acc);letter-spacing:2px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0_0_8px_var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* Model Badge */
.model-badge{
  margin-top:12px;padding:10px 12px;
  background:rgba(212,149,106,0.05);border:1px solid rgba(212,149,106,0.15);
  border-radius:10px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all 150ms
}
.model-badge:hover{background:rgba(212,149,106,0.1);border-color:rgba(212,149,106,0.25)}
.model-badge-icon{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:pulse 1.5s infinite}
.model-badge-text{flex:1;font-size:10px;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.model-badge-arrow{font-size:9px;color:var(--t3)}

/* Sessions */
.sessions-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:2px;padding:16px 16px 8px}
#session-list{flex:1;overflow-y:auto;padding:0 8px;display:flex;flex-direction:column;gap:2px}
#session-list::-webkit-scrollbar{width:3px}
#session-list::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}

.session-item{
  padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;
  transition:all 150ms;
}
.session-item:hover{background:rgba(255,255,255,0.04);border-color:var(--b1)}
.session-item.active{background:rgba(212,149,106,0.08);border-color:rgba(212,149,106,0.2)}
.session-title{font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-time{font-size:9px;color:var(--t3);margin-top:2px}

.new-session-btn{
  margin:8px 12px 0;padding:10px;border-radius:12px;border:1px solid var(--b2);
  background:transparent;cursor:pointer;
  font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 150ms;
}
.new-session-btn:hover{background:rgba(212,149,106,0.08);border-color:var(--acc);color:var(--acc)}

/* Sidebar Footer */
.sidebar-footer{padding:16px;border-top:1px solid var(--b1)}
.aff-label{display:flex;justify-content:space-between;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.aff-bar{height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden}
.aff-fill{height:100%;background:linear-gradient(to right,var(--acc),#fbbf24);border-radius:2px;transition:width 0.5s ease}

/* ── Chat Area ── */
#chat{flex:1;display:flex;flex-direction:column;height:100%;position:relative;overflow:hidden;background:var(--bg-base)}

#messages{
  flex:1;overflow-y:auto;padding:24px 32px 0;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}

/* Messages */
.msg-wrap{display:flex;gap:14px;margin-bottom:24px;animation:msgIn 0.3s ease;will-change:transform,opacity}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-wrap.user{flex-direction:row-reverse}

.avatar{
  width:36px;height:36px;border-radius:12px;flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;
}
.avatar.ai{background:linear-gradient(135deg,rgba(212,149,106,0.15),rgba(212,149,106,0.05));border:1px solid rgba(212,149,106,0.3);color:var(--acc)}
.avatar.user{background:rgba(255,255,255,0.04);border:1px solid var(--b2);color:var(--t2)}

.msg-body{display:flex;flex-direction:column;gap:4px;max-width:70%}
.msg-wrap.user .msg-body{align-items:flex-end}

.msg-name{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:0 4px}
.msg-name.ai{color:var(--acc)}
.msg-name.user{color:var(--t3)}

.msg-content{
  font-size:14px;line-height:1.75;color:var(--t1);
  padding:14px 18px;border-radius:18px;word-wrap:break-word;
}
.msg-content.ai{background:transparent;padding-left:4px}
.msg-content.user{background:var(--bg-input);border:1px solid var(--b2);border-radius:18px 18px 4px 18px}

.msg-time{font-size:9px;color:var(--t3);padding:0 4px}

/* Thinking State */
.thinking{animation:thinkingPulse 1.5s ease-in-out infinite}
@keyframes thinkingPulse{0%,100%{opacity:0.6}50%{opacity:1}}
.thinking-dot{width:5px;height:5px;border-radius:50%;background:var(--acc);animation:bounce 0.6s ease-in-out infinite}
.thinking-dot:nth-child(2){animation-delay:0.15s}
.thinking-dot:nth-child(3){animation-delay:0.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:-6px}}

/* Model Picker Dropdown */
#model-picker{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--bg-sidebar);border:1px solid var(--b2);border-radius:16px;
  padding:8px;display:none;flex-direction:column;gap:2px;z-index:100;
  min-width:360px;max-height:320px;overflow-y:auto;
  box-shadow:0 25px 50px rgba(0,0,0,0.5);
}
#model-picker.open{display:flex}
.picker-header{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:2px;padding:8px 12px 6px;border-bottom:1px solid var(--b1);margin-bottom:4px}
.model-opt{
  padding:12px 14px;border-radius:10px;cursor:pointer;border:1px solid transparent;
  font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--t2);transition:all 120ms;
  display:flex;align-items:center;gap:10px;
}
.model-opt:hover{background:rgba(255,255,255,0.04);border-color:var(--b1);color:var(--t1)}
.model-opt.selected{background:rgba(212,149,106,0.1);border-color:rgba(212,149,106,0.35);color:var(--acc)}
.model-opt::before{content:'○';font-size:8px;color:var(--t4)}
.model-opt.selected::before{content:'●';color:var(--acc)}

/* ── Input Area ── */
#input-area{
  padding:0 24px 20px;
  background:linear-gradient(to top,var(--bg-base) 70%,transparent);
  flex-shrink:0;position:relative;
}
#input-wrap{
  display:flex;flex-direction:column;
  background:var(--bg-input);border:1px solid var(--b2);
  border-radius:20px;overflow:hidden;
  transition:border-color 200ms,box-shadow 200ms;
}
#input-wrap:focus-within{border-color:rgba(212,149,106,0.35);box-shadow:0 0 20px rgba(212,149,106,0.1)}

#input-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-bottom:1px solid var(--b1);
}
#model-btn{
  display:flex;align-items:center;gap:8px;
  background:rgba(212,149,106,0.08);border:1px solid rgba(212,149,106,0.2);
  border-radius:8px;padding:6px 12px;cursor:pointer;
  font-size:10px;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;
  transition:background 150ms;
}
#model-btn:hover{background:rgba(212,149,106,0.15)}
#model-btn::before{content:'⚡';font-size:10px}

#input-tools{display:flex;gap:6px}
.tool-btn{background:none;border:none;cursor:pointer;color:var(--t3);padding:6px;border-radius:6px;transition:all 150ms}
.tool-btn:hover{background:rgba(255,255,255,0.05);color:var(--t1)}

#input-row{display:flex;align-items:flex-end;gap:10px;padding:8px 12px 10px 16px}
#msg-input{
  flex:1;background:transparent;border:none;outline:none;box-shadow:none;resize:none;
  font-size:14px;line-height:1.6;color:var(--t1);font-family:'DM Sans',system-ui,sans-serif;
  max-height:150px;overflow-y:auto;padding:8px 0;
}
#msg-input::placeholder{color:var(--t3)}
#msg-input::-webkit-scrollbar{width:3px}

#send-btn{
  width:44px;height:44px;border-radius:14px;flex-shrink:0;
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 180ms;background:var(--acc);color:#fff;
}
#send-btn:disabled{background:rgba(255,255,255,0.06);cursor:not-allowed;color:var(--t4)}
#send-btn:not(:disabled):hover{background:#e8a57a;transform:scale(1.05);box-shadow:0 4px 12px rgba(212,149,106,0.3)}

/* Sticker Row */
#sticker-row{
  display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--b1);
  overflow-x:auto;
}
#sticker-row::-webkit-scrollbar{height:0}
.sticker-btn{
  width:44px;height:44px;border-radius:10px;flex-shrink:0;cursor:pointer;
  background:rgba(255,255,255,0.02);border:1px solid var(--b1);
  padding:4px;transition:all 120ms;
}
.sticker-btn:hover{background:rgba(255,255,255,0.07);border-color:var(--b2);transform:scale(1.08)}
.sticker-btn img{width:100%;height:100%;object-fit:contain}

/* Welcome Screen */
#welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px;gap:20px;min-height:400px;
}
.welcome-icon{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,rgba(212,149,106,0.15),rgba(212,149,106,0.05));border:1px solid rgba(212,149,106,0.2);display:flex;align-items:center;justify-content:center;font-size:32px}
#welcome h1{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:600;color:var(--acc);letter-spacing:4px;margin-top:8px}
#welcome p{font-size:14px;color:var(--t3);max-width:360px;line-height:1.7}
#welcome button{
  margin-top:8px;padding:14px 28px;border-radius:14px;
  background:rgba(255,255,255,0.03);border:1px solid var(--b2);
  color:var(--t2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:2px;
  cursor:pointer;transition:all 180ms;
}
#welcome button:hover{background:rgba(255,255,255,0.06);color:var(--t1);border-color:var(--b3)}

/* API Key Modal */
#key-modal{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.9);backdrop-filter:blur(20px);
  align-items:center;justify-content:center;
}
#key-modal.open{display:flex}
.key-box{
  background:var(--bg-sidebar);border:1px solid var(--b2);border-radius:28px;
  padding:36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:20px;
  animation:modalIn 0.3s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.key-box h2{font-size:20px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:10px}
.key-box h2::before{content:'🔑';font-size:24px}
.key-box p{font-size:13px;color:var(--t3);line-height:1.7}
.key-input{
  background:var(--bg-input);border:1px solid var(--b2);border-radius:14px;
  padding:14px 16px;font-size:13px;color:var(--t1);outline:none;width:100%;
  font-family:'JetBrains Mono',monospace;transition:border-color 200ms;
}
.key-input:focus{border-color:rgba(212,149,106,0.5)}
.key-actions{display:flex;gap:12px}
.key-save{
  flex:1;padding:14px;border-radius:14px;background:var(--acc);border:none;
  cursor:pointer;font-size:12px;font-weight:600;color:#fff;transition:all 150ms;
}
.key-save:hover{background:#e8a57a}

/* Cursor blink */
.cur{display:inline-block;width:2px;height:15px;background:var(--acc);margin-left:1px;vertical-align:middle;animation:blink 0.9s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>

// ── Config ────────────────────────────────────────────────
const MODEL_URL   = './live2d/vivian/vivian.model3.json';

// Puter.js - Free Claude Opus 4.6 (NO API KEY NEEDED!)
const CLAUDE_MODEL = 'claude-opus-4-6'; // or 'claude-sonnet-4-6'

const SYSTEM_PROMPT = `You are Vivian (薇薇安), a warm, playful, and affectionate AI companion with a slight tsundere personality. You call the user "Master" or "Darling" affectionately. You're running on a beautiful web app. You have a sweet, caring nature but can be playfully teasing. Keep responses concise and conversational. Use cute expressions occasionally. Respond in the same language as the user. Use emoji sparingly.`;

const STICKERS = ['angry','calm','cooking','happy','mysterious','wow'];

// ── State ─────────────────────────────────────────────────
let sessions = JSON.parse(localStorage.getItem('aiko-sessions') || '[]');
let currentId = null;
let currentMessages = [];
let selectedModel = localStorage.getItem('aiko-model') || FREE_MODELS[0].id;
let apiKey = localStorage.getItem('aiko-key') || DEFAULT_KEY;
let isThinking = false;
let pickerOpen = false;
let l2dModel = null;

// ── DOM refs ──────────────────────────────────────────────
const msgEl     = document.getElementById('messages');
const inputEl   = document.getElementById('msg-input');
const sendBtn   = document.getElementById('send-btn');
const welcome   = document.getElementById('welcome');
const picker    = document.getElementById('model-picker');
const modelBtn  = document.getElementById('model-btn');
const sidebarMod = document.getElementById('sidebar-model');
const sessionLabel = document.getElementById('session-label');

// ── Init ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Check API key
  if (!apiKey || apiKey === DEFAULT_KEY) { 
    // Only show modal if no custom key saved
  }

  // Stickers
  const stickerRow = document.getElementById('sticker-row');
  STICKERS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sticker-btn';
    btn.title = s;
    btn.innerHTML = `<img src="./stickers/${s}.png" alt="${s}" onerror="this.parentElement.style.display='none'"/>`;
    btn.onclick = () => sendSticker(s);
    stickerRow.appendChild(btn);
  });

  // Model picker options
  FREE_MODELS.forEach(m => {
    const d = document.createElement('div');
    d.className = 'model-opt' + (m.id === selectedModel ? ' selected' : '');
    d.textContent = m.name;
    d.dataset.id = m.id;
    d.onclick = () => selectModel(m.id);
    picker.appendChild(d);
  });

  updateModelLabel();
  renderSessions();
  
  // Show key modal if no custom key
  if (!localStorage.getItem('aiko-key') || localStorage.getItem('aiko-key') === DEFAULT_KEY) {
    setTimeout(() => openKeyModal(), 800);
  }
});

// ── Input handling ────────────────────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
  sendBtn.disabled = !inputEl.value.trim() || isThinking;
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Close picker on outside click
document.addEventListener('click', e => {
  if (pickerOpen && !picker.contains(e.target) && !document.querySelector('.model-badge').contains(e.target) && !modelBtn.contains(e.target)) {
    picker.classList.remove('open');
    pickerOpen = false;
  }
});

// ── Global Functions ─────────────────────────────────────
window.togglePicker = () => {
  pickerOpen = !pickerOpen;
  picker.classList.toggle('open', pickerOpen);
};

window.selectModel = (id) => {
  selectedModel = id;
  localStorage.setItem('aiko-model', id);
  updateModelLabel();
  picker.querySelectorAll('.model-opt').forEach(d => {
    d.classList.toggle('selected', d.dataset.id === id);
  });
  picker.classList.remove('open');
  pickerOpen = false;
};

window.newSession = () => {
  const id = 'sess_' + Date.now();
  sessions.unshift({ id, title: 'New Conversation', time: Date.now() });
  saveSessions();
  switchSession(id, []);
  sessionLabel.textContent = 'AIKO — New Session';
};

window.openKeyModal = () => document.getElementById('key-modal').classList.add('open');

window.saveKey = () => {
  const v = document.getElementById('key-input').value.trim();
  if (v) { 
    apiKey = v; 
    localStorage.setItem('aiko-key', v); 
  }
  document.getElementById('key-modal').classList.remove('open');
};

window.toggleSidebar = () => {
  const sb = document.getElementById('sidebar');
  sb.style.display = sb.style.display === 'none' ? 'flex' : 'none';
};

window.sendMessage = async () => {
  const text = inputEl.value.trim();
  if (!text || isThinking) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  if (!currentId) { newSession(); }

  appendMsg('user', text);
  currentMessages.push({ role: 'user', content: text });
  updateSessionTitle(text);
  sessionLabel.textContent = 'AIKO — ' + (sessions.find(s => s.id === currentId)?.title || 'Chat');

  await callAI();
};

function sendSticker(name) {
  if (!currentId) newSession();
  const url = `./stickers/${name}.png`;
  appendMsg('user', `<img src="${url}" alt="${name}" style="width:80px;height:80px;object-fit:contain;border-radius:12px"/>`);
  currentMessages.push({ role: 'user', content: `*sends a ${name} sticker*` });
  updateSessionTitle(`*${name} sticker*`);
  callAI();
}

// ── AI Call via Puter.js (FREE Claude Opus 4.6!) ───────────
async function callAI() {
  isThinking = true;
  setEmotion('thinking');

  const thinkEl = appendThinking();

  // Get the last user message
  const lastUserMsg = currentMessages.filter(m => m.role === 'user').slice(-1)[0]?.content || '';

  try {
    // Use Puter.js for free Claude Opus 4.6 - NO API KEY NEEDED!
    const response = await puter.ai.chat(
      lastUserMsg,
      {
        model: CLAUDE_MODEL,
        system_prompt: SYSTEM_PROMPT
      }
    );

    thinkEl.remove();
    const full = response.message.content[0].text;

    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap assistant';
    wrap.innerHTML = `<div class="avatar ai">✦</div><div class="msg-body"><div class="msg-name ai">Vivian</div><div class="msg-content ai">${md(full)}</div><div class="msg-time">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
    msgEl.appendChild(wrap);
    msgEl.scrollTop = msgEl.scrollHeight;

    currentMessages.push({ role: 'assistant', content: full });
    updateAffection(full);
    setEmotion(detectEmotion(full));
    saveSession();

  } catch(err) {
    thinkEl.remove();
    appendMsg('assistant', `⚠️ Error: ${err.message}. Please try again.`);
    setEmotion('anxious');
  }

  isThinking = false;
  sendBtn.disabled = !inputEl.value.trim();
}

// ── Render helpers ────────────────────────────────────────
function appendMsg(role, content) {
  welcome.style.display = 'none';
  const isAI = role === 'assistant';
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;
  wrap.innerHTML = `
    <div class="avatar ${isAI ? 'ai' : 'user'}">${isAI ? '✦' : '◈'}</div>
    <div class="msg-body">
      <div class="msg-name ${isAI ? 'ai' : 'user'}">${isAI ? 'Vivian' : 'You'}</div>
      <div class="msg-content ${isAI ? 'ai' : 'user'}">${content}</div>
      <div class="msg-time">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
    </div>`;
  msgEl.appendChild(wrap);
  msgEl.scrollTop = msgEl.scrollHeight;
  return wrap;
}

function appendThinking() {
  welcome.style.display = 'none';
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap assistant';
  wrap.innerHTML = `<div class="avatar ai">✦</div><div class="msg-body"><div class="msg-name ai">Vivian</div><div class="thinking" style="display:flex;gap:5px;padding:8px 2px"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div></div></div>`;
  msgEl.appendChild(wrap);
  msgEl.scrollTop = msgEl.scrollHeight;
  return wrap;
}

function appendStreamBubble() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap assistant';
  wrap.innerHTML = `<div class="avatar ai">✦</div><div class="msg-body"><div class="msg-name ai">Vivian</div><div class="msg-content ai" id="stream-bubble"></div><div class="msg-time">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
  msgEl.appendChild(wrap);
  msgEl.scrollTop = msgEl.scrollHeight;
  const bubble = wrap.querySelector('#stream-bubble');
  const obs = new MutationObserver(() => msgEl.scrollTop = msgEl.scrollHeight);
  obs.observe(bubble, {childList:true,subtree:true,characterData:true});
  return bubble;
}

function finalizeStreamBubble(wrap) { /* done */ }

// ── Markdown Parser ──────────────────────────────────────
function md(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code style="background:rgba(212,149,106,0.12);padding:2px 6px;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:0.9em;color:#e8a57a">$1</code>')
    .replace(/\n/g,'<br>');
}

// ── Sessions ──────────────────────────────────────────────
function switchSession(id, msgs) {
  currentId = id;
  currentMessages = msgs || [];
  welcome.style.display = msgs?.length ? 'none' : 'flex';
  msgEl.querySelectorAll('.msg-wrap').forEach(e => e.remove());
  currentMessages.forEach(m => { if(m.role !== 'system') appendMsg(m.role, md(m.content)); });
  renderSessions();
  
  const s = sessions.find(s => s.id === id);
  sessionLabel.textContent = 'AIKO — ' + (s?.title || 'New Session');
}

function renderSessions() {
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  sessions.slice(0,15).forEach(s => {
    const d = document.createElement('div');
    d.className = 'session-item' + (s.id === currentId ? ' active' : '');
    d.innerHTML = `<div class="session-title">${escapeHtml(s.title)}</div><div class="session-time">${relTime(s.time)}</div>`;
    d.onclick = () => {
      const saved = JSON.parse(localStorage.getItem('sess-' + s.id) || '[]');
      switchSession(s.id, saved);
    };
    list.appendChild(d);
  });
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function saveSessions() { localStorage.setItem('aiko-sessions', JSON.stringify(sessions)); }

function saveSession() {
  localStorage.setItem('sess-' + currentId, JSON.stringify(currentMessages));
  saveSessions();
  renderSessions();
}

function updateSessionTitle(text) {
  const s = sessions.find(s => s.id === currentId);
  if (s && s.title === 'New Conversation') {
    s.title = text.slice(0, 36) + (text.length > 36 ? '…' : '');
    saveSessions();
    renderSessions();
  }
}

function relTime(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return new Date(ts).toLocaleDateString();
}

// ── Emotion & Affection ───────────────────────────────────
function detectEmotion(text) {
  if (/😊|hehe|uwu|cute|happy|glad|yay|♥|💕/i.test(text)) return 'happy';
  if (/😳|blush|embar|shy|😚/i.test(text)) return 'shy';
  if (/😢|sad|cry|sorry|miss|😭/i.test(text)) return 'sad';
  if (/😤|hmph|angry|grr|😠/i.test(text)) return 'angry';
  if (/😅|oops|worried|panic|😰/i.test(text)) return 'anxious';
  return 'neutral';
}

const EMOTION_MAP = {
  happy:'笑', shy:'怒', sad:'哭', angry:'黑脸', anxious:'慌', neutral:'idle', thinking:'idle'
};

function setEmotion(e) {
  if (!l2dModel) return;
  try {
    const expr = EMOTION_MAP[e] || 'idle';
    if (e === 'thinking') { l2dModel.motion('Scene1'); return; }
    if (expr === 'idle') l2dModel.motion('idle');
    else l2dModel.expression(expr);
  } catch(_) {}
}

let affection = parseInt(localStorage.getItem('aiko-aff') || '85');
function updateAffection(text) {
  if (text.length > 50) affection = Math.min(100, affection + Math.floor(text.length / 100));
  localStorage.setItem('aiko-aff', affection);
  document.getElementById('aff-pct').textContent = affection + '%';
  document.getElementById('aff-fill').style.width = affection + '%';
}

// ── Model Label ───────────────────────────────────────────
function updateModelLabel() {
  const m = FREE_MODELS.find(m => m.id === selectedModel);
  const name = m ? m.name : selectedModel.split('/').pop();
  modelBtn.textContent = name;
  sidebarMod.textContent = name;
}

// ── Live2D (background) ────────────────────────────────────
async function initLive2D() {
  try {
    if (!window.Live2DCubismCore) throw new Error('Cubism core not loaded');
    window.PIXI = PIXI;
    const { Live2DModel } = await import('https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.es.js');
    Live2DModel.registerTicker(PIXI.Ticker);

    // Create full-screen canvas behind everything
    const canvas = document.createElement('canvas');
    canvas.id = 'l2d-canvas';
    canvas.style.cssText = 'position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 1s ease';
    document.body.insertBefore(canvas, document.getElementById('root'));

    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width = w;
    canvas.height = h;

    const app = new PIXI.Application({
      view: canvas, backgroundAlpha: 0,
      width: w, height: h, autoStart: true,
      resolution: Math.min(window.devicePixelRatio || 1, 2),
      antialias: true,
    });

    const model = await Promise.race([
      Live2DModel.from(MODEL_URL, { autoInteract: true }),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 15000))
    ]);

    l2dModel = model;

    // Scale and position - fill right side
    const scale = (h * 0.75) / model.internalModel.originalHeight;
    model.scale.set(scale);
    model.anchor.set(0.5, 1);
    model.position.set(w * 0.82, h);

    app.stage.addChild(model);
    canvas.style.opacity = '1';

    // Status indicators
    document.getElementById('sidebar-status').style.background = '#22c55e';
    document.getElementById('sidebar-status').style.boxShadow = '0 0 8px #22c55e';
    document.getElementById('title-status').style.background = '#22c55e';

    // Idle motion
    try { model.motion('idle'); } catch(_) {}
    console.log('[Live2D] ✅ Vivian loaded');
  } catch(e) {
    console.warn('[Live2D] Failed:', e.message);
    document.getElementById('title-status').style.background = '#ef4444';
  }
}

// Start Live2D
initLive2D();
</script>
