# OpenClaw Skill for Aiko
# Provides Aiko with access to OpenClaw's full capabilities

name: openclaw
version: 1.0.0
description: |
  Full integration with OpenClaw - spawn coding agents, manage files,
  generate images, check weather, and access shared memory.

endpoints:
  bridge_url: http://localhost:8765
  
capabilities:
  - coding
  - file_management
  - image_generation
  - web_search
  - memory_sync
  - task_delegation

agents:
  codex:
    description: "OpenAI Codex - best for coding tasks, file operations"
    command: "codex exec --full-auto"
    
  claude:
    description: "Claude Code - best for complex reasoning, large refactors"
    command: "claude --permission-mode bypassPermissions --print"
    
  antigravity:
    description: "Gemini/Antigravity - best for creative tasks, multimodal"
    endpoint: "http://localhost:8000/api/gemini"

memory:
  shared_file: ~/clawd/memory/aiko_bridge_sync.md
  sync_interval: 60  # seconds

templates:
  coding_task: |
    Task from Aiko: {task}
    
    Context:
    - Aiko's mood: {mood}
    - User: {user_name}
    - Project: {project}
    
    Please complete this task and report back clearly.
  
  research_task: |
    Research request from Aiko: {query}
    
    Provide comprehensive findings that Aiko can use to help {user_name}.
