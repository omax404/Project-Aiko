name: Aiko S+ CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
    - name: Lint with Ruff
      run: ruff check core/ tests/
    - name: Run tests
      run: pytest tests/ -v --cov=core --cov-report=xml --cov-fail-under=70
      env:
        AIKO_SECRET_KEY: test-secret
        MASTER_ID: "123456789"
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aiko-app
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: aiko-app/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Type check
      run: npx tsc --noEmit
    - name: Build
      run: npm run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run Bandit
      uses: PyCQA/bandit@main
      with:
        args: "-r core/ -f json -o bandit-report.json"
    - name: Upload Bandit results
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report
        path: bandit-report.json

  release:
    needs: [test-python, test-frontend, security-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: aiko-app/package-lock.json
        
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build Python Sidecar
      run: python build_sidecar.py
      
    - name: Install Frontend dependencies
      working-directory: aiko-app
      run: npm ci
      
    - name: Build Tauri App
      working-directory: aiko-app
      run: npm run tauri build
      
    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          aiko-app/src-tauri/target/release/bundle/msi/*.msi
          aiko-app/src-tauri/target/release/bundle/nsis/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
