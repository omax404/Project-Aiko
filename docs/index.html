<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Project Aiko is a self-hosted AI companion with memory, voice, vision, Live2D presence, and autonomous agency."
    />
    <meta name="theme-color" content="#0b0d12" id="themeColor" />
    <meta property="og:title" content="Project Aiko" />
    <meta property="og:site_name" content="Project Aiko" />
    <meta
      property="og:description"
      content="A cyber companion with emotional memory, local voice, multimodal vision, and desktop agency."
    />
    <meta property="og:image" content="https://omax404.github.io/Project-Aiko/assets/hero-cover.webp" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Project Aiko | AI Companion</title>
    <link rel="icon" href="./assets/icons/favicon.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,850&family=Nunito+Sans:wght@500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="site-header">
        <div class="header-inner">
          <div class="header-left">
            <a class="brand" href="./" aria-label="Project Aiko home">
              <img src="./assets/icons/favicon.webp" alt="" />
              <span>Project Aiko</span>
            </a>
            <button class="search-button" type="button" aria-label="Search">
              <span class="icon">⌕</span>
              <span class="search-label">Search</span>
              <kbd>⌘ K</kbd>
            </button>
          </div>

          <nav class="desktop-nav" aria-label="Main navigation">
            <a href="https://github.com/omax404/Project-Aiko#readme" target="_blank" rel="noreferrer">Docs</a>
            <a href="https://github.com/omax404/Project-Aiko" target="_blank" rel="noreferrer">GitHub</a>
            <button class="nav-menu" type="button">v0.1.0 <span>⌄</span></button>
            <button class="nav-menu" type="button">About <span>⌄</span></button>
            <span class="divider"></span>
            <button class="switch" id="motion-toggle" type="button" aria-label="Enable motion" aria-pressed="true">
              <span>✣</span>
            </button>
            <button class="switch" id="theme-toggle" type="button" aria-label="Switch theme" aria-pressed="true">
              <span>☾</span>
            </button>
            <span class="divider"></span>
            <a class="icon-link" href="https://github.com/omax404/Project-Aiko" target="_blank" rel="noreferrer" aria-label="GitHub">
              Git
            </a>
          </nav>

          <button class="mobile-menu" type="button" aria-label="Open menu">•••</button>
        </div>
      </header>

      <main class="home">
        <section class="hero" aria-label="Project Aiko landing">
          <div class="hero-content" data-float>
            <h1>Project Aiko</h1>
            <p>A container of soul for an AI companion to bring her into your world.</p>
            <div class="hero-actions">
              <a class="hero-button primary" href="https://omax404.github.io/Project-Aiko/" target="_self">Try Live</a>
              <a class="hero-button" href="https://github.com/omax404/Project-Aiko" target="_blank" rel="noreferrer">Download</a>
              <a class="hero-button" href="https://github.com/omax404/Project-Aiko#readme" target="_blank" rel="noreferrer">Get Started</a>
            </div>
          </div>

          <div class="background-scene" aria-hidden="true">
            <div class="icon-pattern"></div>
            <div class="fade-layer"></div>
            <div class="cover-wrap" id="cover-wrap">
              <img src="./assets/hero-cover.webp" alt="" />
              <div class="silhouette silhouette-one"></div>
              <div class="silhouette silhouette-two"></div>
            </div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <div>
          Since 2026 @
          <a href="https://github.com/omax404/Project-Aiko" target="_blank" rel="noreferrer">Project Aiko</a>
          ×
          <a href="https://github.com/omax404" target="_blank" rel="noreferrer">omax404</a>
        </div>
      </footer>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
