version: '3.8'

services:
  aiko-desktop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiko_elite_desktop
    restart: unless-stopped
    ports:
      - "8550:8550" # Flet Web UI
      - "8002:8002" # Callback Server
    environment:
      - FLET_SERVER_PORT=8550
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - ENVIRONMENT=production
    volumes:
      - ./data/memory:/app/data/memory
      - ./data/logs:/app/data/logs
      - ./assets:/app/assets
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8550/" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - aiko-sandbox

  aiko-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: aiko_sandbox
    restart: unless-stopped
    ports:
      - "8080:8080"

